spring.application.name=banking-api
# Server
server.port=8080

# H2 In-memory Database
spring.datasource.url=jdbc:h2:mem:bankingdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JWT
# IMPORTANT: This secret must be a Base64-encoded string of at least 256 bits (32 bytes).
# The value below is safe for development. Change it before deploying to production.
jwt.secret=YOUR_BASE64_256BIT_SECRET_HERE
jwt.expiration=86400000

# Swagger UI
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.operationsSorter=method